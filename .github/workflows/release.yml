name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Markdown Editor ${{ github.ref_name }}"
          releaseBody: |
            ## 🎉 Markdown Editor ${{ github.ref_name }}

            ### 功能特性
            - 📝 基于 Milkdown 的 Markdown 编辑器
            - 📑 支持 Typora 风格的 [TOC] 目录渲染
            - 🖨️ PDF 导出功能
            - 🌙 深色/浅色主题切换
            - 💾 本地文件读写

            ### 下载说明
            - **Windows**: 下载 `.msi` 或 `.exe` 文件
            - **macOS (Intel)**: 下载 `x86_64.dmg` 文件
            - **macOS (Apple Silicon)**: 下载 `aarch64.dmg` 文件
            - **Linux**: 下载 `.deb` 或 `.AppImage` 文件

            > ⚠️ macOS 首次打开可能需要在「系统设置 → 隐私与安全性」中允许运行
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
